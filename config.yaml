# --- Structural & Windowing Parameters ---
window_size: 64
stride: 2
test_stride: 1
batch_size: 128
test_batch_size: 16
val_split: 0.2

# --- Model Hyperparameters ---
latent_dim: 256 # Total (z_sys[256] + z_res[256])
lr: 0.0001 # Adam optimizer learning rate

# --- Hamiltonian Physics Parameters ---
hnn_steps: 3 # Integration steps for Leapfrog
hnn_dt: 0.05 # Time step for symplectic flow
hnn_feature_dim: 128 # Hidden dimension for HNN/FNO branches
fno_modes: 8

# --- Loss Weights & Training ---
lambda_d: 1.0 # Discriminator loss weight λ1
lambda_e: 1.0 # Encoder loss weight λ2
recon_weight: 1.0 # Reconstruction loss weight
res_adv_weight: 1.0
jitter_alpha_max: 0.45
lambda_joint: 1.0

# --- Training Loop ---
epochs: 100 #
patience: 3 # Early stopping patience
saved_score: false # Save raw score artifacts to disk in addition to live scoring
smd_compact: true
smap_compact: true
msl_compact: True
dataset: MSL # Dataset type
data_root:
  SMD: /workspace/smd/smd/ServeMachineDataset
  SMAP: /home/utsab/Data/SMAP
  MSL: /home/utsab/Data/MSL
  PSM: /home/utsab/Data/PSM
  SWAT: /workspace/SWAT/SWAT
